[package]
name = "tetris"
version = "0.1.0"

[profile]
default = "debug"

[platform]
default = "wasm"

[build]
entry = "src/main.mt"
preload = "assets"
html_template = "web/shell.html"

[dependencies]
"tetris.pieces" = { path = "packages/tetris_pieces", version = "0.1.0" }
"tetris.rules" = { path = "packages/tetris_rules", version = "0.1.0" }
