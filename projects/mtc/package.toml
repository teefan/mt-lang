# Milk Tea Compiler (self-hosted)
#
# Parses, type-checks, lowers, and emits C for Milk Tea source.
# Bootstrapped by the Ruby compiler — goal is to compile itself.

[package]
name = "mtc"
version = "0.1.0"
source_root = "src"

[profile]
default = "debug"

[platform]
default = "linux"

[build]
entry = "src/main.mt"
